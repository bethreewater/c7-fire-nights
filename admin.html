<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>夏夜火舞 · 訂位後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="booking.css">
<style>
  .fb-card{border:1px solid var(--line2);border-radius:8px;padding:18px 20px;margin-bottom:14px;}
  .fb-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);}
  .fb-when{font-family:var(--mono);font-size:11px;color:var(--mute);}
  .fb-ses{font-family:var(--mono);font-size:11px;color:var(--fire);letter-spacing:.04em;}
  .fb-name{font-weight:500;color:var(--paper);}
  .fb-first{font-size:11px;color:var(--soft);}
  .fb-q{display:flex;gap:12px;padding:4px 0;font-size:13.5px;line-height:1.7;}
  .fb-lab{color:var(--mute);flex:none;min-width:11em;font-size:12.5px;}
  .fb-val{color:var(--soft);}
  .fb-key{margin:0 0 8px;padding:10px 12px;border-left:2px solid var(--fire);background:rgba(209,72,32,.06);border-radius:0 4px 4px 0;}
  .fb-key .fb-lab{color:var(--fire);}
  .fb-key .fb-val{color:var(--paper);}
  @media(max-width:600px){ .fb-q{flex-direction:column;gap:1px;} .fb-lab{min-width:0;} }
  /* 席次 ± 控制 */
  .metaR{display:inline-flex;align-items:center;gap:10px;}
  .seatadj{display:inline-flex;gap:6px;}
  .seatbtn{
    width:30px;height:30px;border:1px solid var(--line2);border-radius:6px;
    background:none;color:var(--soft);font-size:16px;line-height:1;cursor:pointer;
    font-family:var(--mono);transition:border-color .2s,color .2s;
  }
  .seatbtn:hover{border-color:var(--fire);color:var(--fire);}
  .seatbtn:disabled{opacity:.4;cursor:default;}
  .caps-note{font-size:12px;color:var(--mute);line-height:1.7;margin:10px 2px 0;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============================================================
       A. 登入閘（Firebase Auth — Email/Password）
       ============================================================ -->
  <section id="login" class="login" aria-label="後台登入">
    <div class="pg-kicker">後台 / ADMIN</div>
    <h1 class="pg-h1">登入</h1>
    <form id="loginForm" novalidate>
      <div class="fld" id="emailFld">
        <label for="email">帳號（e-mail）</label>
        <input type="email" id="email" autocomplete="username" autocapitalize="off" spellcheck="false" inputmode="email" placeholder="you@example.com">
      </div>
      <div class="fld" id="pwFld">
        <label for="pw">密碼</label>
        <input type="password" id="pw" autocomplete="current-password" autocapitalize="off" spellcheck="false">
        <div class="err" id="loginErr">帳號或密碼不對</div>
      </div>
      <button type="submit" class="btn btn-fire" id="loginBtn">進入</button>
    </form>
  </section>

  <!-- ============================================================
       B. 後台主體（登入後顯示）
       ============================================================ -->
  <main id="admin" hidden>
    <header class="site-head">
      <div class="brand">CONTAINER NO.7 · 訂位後台</div>
      <a href="#" class="back" id="logout">登出</a>
    </header>

    <!-- 01 名額總覽 -->
    <div class="sec-h"><span class="idx">01</span><h2>名額總覽</h2><span class="en">Capacity</span></div>
    <div id="caps"><!-- caps 或 empty 由 JS 注入 --></div>

    <!-- 02 訂位管理 -->
    <div class="sec-h"><span class="idx">02</span><h2>訂位管理</h2><span class="en">Bookings</span></div>
    <div class="seg" id="filters" role="tablist" aria-label="訂位篩選">
      <button type="button" data-filter="all" class="on" aria-pressed="true">全部</button>
      <button type="button" data-filter="pending" aria-pressed="false">待匯款</button>
      <button type="button" data-filter="confirmed" aria-pressed="false">已確認</button>
      <button type="button" data-filter="ended" aria-pressed="false">已過期</button>
    </div>
    <div id="list"><!-- 表格或 empty 由 JS 注入 --></div>

    <!-- 03 回饋 -->
    <div class="sec-h"><span class="idx">03</span><h2>回饋</h2><span class="en">Feedback</span></div>
    <div id="fblist"><!-- 回饋卡或 empty 由 JS 注入 --></div>

    <!-- 04 夥伴折扣碼 -->
    <div class="sec-h"><span class="idx">04</span><h2>夥伴折扣碼</h2><span class="en">Partners</span></div>
    <form id="partnerForm" class="pform">
      <input type="text" id="pName" placeholder="夥伴名稱（例：獺浪民宿）" autocomplete="off">
      <input type="text" id="pCode" placeholder="代碼（例：lunos07）" autocomplete="off" autocapitalize="characters">
      <select id="pCat">
        <option value="民宿">民宿</option>
        <option value="旅行社">旅行社</option>
        <option value="其他">其他</option>
      </select>
      <button type="submit" class="btn btn-sm btn-fire">新增／更新</button>
    </form>
    <div id="partners"><!-- 由 JS 注入 --></div>
  </main>

  <style>
    .pform { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 18px; }
    .pform input, .pform select { padding: 9px 11px; border: 1px solid rgba(138,133,123,.4); border-radius: 7px; background: transparent; color: inherit; font: inherit; font-size: 14px; }
    .pform input { flex: 1 1 160px; }
    .pcat { display: flex; align-items: baseline; gap: 8px; margin: 18px 0 8px; }
    .pcat-t { font-family: var(--mono, 'IBM Plex Mono', monospace); font-size: 12px; letter-spacing: .14em; color: var(--fire, #D14820); text-transform: uppercase; }
    .pcat-n { font-size: 12px; color: var(--mute, #8A857B); }
    .prow { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding: 11px 0; border-bottom: 1px solid rgba(138,133,123,.2); }
    .prow.off { opacity: .5; }
    .pmain b { font-weight: 600; }
    .pcode { font-family: var(--mono, 'IBM Plex Mono', monospace); font-size: 13px; color: var(--fire, #D14820); margin-left: 10px; }
    .poff { font-size: 11px; color: var(--mute, #8A857B); margin-left: 8px; }
    .pstat { font-size: 13px; color: var(--mute, #8A857B); }
    .pstat b { color: inherit; font-weight: 600; }
    .pact { display: flex; gap: 6px; }
  </style>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Firebase（compat 版，提供全域 firebase 物件給 booking-store.js 使用） -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="booking-store.js"></script>
<script>
(function () {
  'use strict';

  /* ----------------------------------------------------------------
     小工具
  ---------------------------------------------------------------- */
  var $ = function (sel, root) { return (root || document).querySelector(sel); };

  // 把使用者輸入安全地放進 innerHTML（避免姓名/電話含特殊字元破版）
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }

  // createAt（毫秒）→ "M/D HH:MM"
  function fmtWhen(ms) {
    var d = new Date(ms);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }

  // sessionId "6/20|night" → "6/20 Night"（用 sessions() 取正式 label）
  var SESSION_LABEL = {};
  function buildSessionLabels() {
    SESSION_LABEL = {};
    C7.sessions().forEach(function (s) { SESSION_LABEL[s.id] = s.date + ' ' + s.label; });
  }
  function sessionLabel(id) { return SESSION_LABEL[id] || id; }

  var STATUS = {
    pending:   { cls: 'pend',      txt: '待匯款' },
    confirmed: { cls: 'conf',      txt: '已確認' },
    expired:   { cls: 'exp',       txt: '已過期' },
    cancelled: { cls: 'cancelled', txt: '已取消' }
  };

  var toastTimer = null;
  function toast(msg) {
    var el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2600);
  }

  /* ================================================================
     A. 登入閘（Firebase Auth — Email/Password）
  ================================================================ */
  function showAdmin() {
    $('#login').hidden = true;
    $('#admin').hidden = false;
    startAdmin();
  }
  function showLogin() {
    $('#admin').hidden = true;
    $('#login').hidden = false;
    $('#pwFld').classList.remove('invalid');
  }

  $('#loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = $('#email').value.trim();
    var pw = $('#pw').value;
    var fld = $('#pwFld');
    var btn = $('#loginBtn');
    fld.classList.remove('invalid');
    btn.disabled = true;
    C7.signIn(email, pw).then(function () {
      // 登入成功 → 下方 C7.onAuth 會切到後台
    }).catch(function () {
      fld.classList.add('invalid');
      $('#pw').focus(); $('#pw').select();
    }).then(function () { btn.disabled = false; });
  });

  $('#logout').addEventListener('click', function (e) {
    e.preventDefault();
    C7.signOut();   // onAuth 會切回登入畫面
  });

  // 登入狀態變化（含重新整理自動恢復）→ 切換畫面
  C7.onAuth(function (user) {
    if (user && user.email === 'mryomryo@gmail.com') showAdmin();
    else showLogin();
  });

  /* ================================================================
     B. 後台渲染
  ================================================================ */

  // --- 01 名額總覽 -------------------------------------------------
  // 只顯示有任何 confirmed 或 pending 的場次，以免 24 格全空。
  function renderCaps() {
    var host = $('#caps');
    var rows = [];
    C7.sessions().forEach(function (s) {
      var c = C7.capacity(s.id);

      var pct = Math.min(100, Math.round((c.confirmed + c.pending) / c.cap * 100));
      var metaLeft = '上限 ' + c.cap + ' · 確認 ' + c.confirmed +
                     (c.pending > 0 ? ' · 保留 ' + c.pending : '');
      var right = (c.full
        ? '<span class="left full">已滿</span>'
        : '<span class="left">剩 ' + c.remaining + '</span>') +
        '<span class="seatadj">' +
          '<button type="button" class="seatbtn" data-pid="' + esc(s.id) + '" data-d="-1" aria-label="減一席">−</button>' +
          '<button type="button" class="seatbtn" data-pid="' + esc(s.id) + '" data-d="1" aria-label="加一席">＋</button>' +
        '</span>';

      rows.push(
        '<div class="cap">' +
          '<div class="ct">' + esc(s.date + ' ' + s.label) + '</div>' +
          '<div class="bar"><i style="width:' + pct + '%"></i></div>' +
          '<div class="meta"><span>' + metaLeft + '</span><span class="metaR">' + right + '</span></div>' +
        '</div>'
      );
    });

    host.innerHTML = rows.length
      ? '<div class="caps">' + rows.join('') + '</div>' +
        '<p class="caps-note">＋／−＝手動調整「已確認席次」：IG／電話訂位入帳用＋，釋放席次用−（線上訂位確認會自動入帳，不用手動加）。</p>'
      : '<div class="empty">場次同步中…</div>';
  }

  // 席次 ± 按鈕（事件委派，重繪不掉監聽）
  $('#caps').addEventListener('click', function (e) {
    var b = e.target.closest('.seatbtn');
    if (!b) return;
    b.disabled = true;
    C7.adjustSeats(b.dataset.pid, Number(b.dataset.d))
      .then(function () { toast('已更新席次'); })
      .catch(function (err) { toast('更新失敗：' + (err && err.message)); })
      .finally(function () { b.disabled = false; });
  });

  // --- 02 訂位管理 -------------------------------------------------
  var filter = 'all';

  // 篩選分桶：已取消與已過期同屬「終結」狀態，歸到「已過期」分頁。
  function passesFilter(b) {
    if (filter === 'all')       return true;
    if (filter === 'pending')   return b.status === 'pending';
    if (filter === 'confirmed') return b.status === 'confirmed';
    if (filter === 'ended')     return b.status === 'expired' || b.status === 'cancelled';
    return true;
  }

  function sessionsCell(b) {
    var labels = b.sessionIds.map(function (id) { return esc(sessionLabel(id)); });
    var html = '<b>' + labels.join(' ＋ ') + '</b>';
    if (b.sessionIds.length > 1) html += ' <span class="phone">· 多場</span>';
    return html;
  }

  // 倒數欄（依狀態決定內容；pending 的數值由 tick() 每秒刷新）
  function countdownCell(b) {
    if (b.status === 'pending') {
      var left = b.holdUntil - Date.now();
      return '<span class="cd" data-hold="' + b.holdUntil + '">' + C7.fmtCountdown(left) + '</span>';
    }
    if (b.status === 'expired')   return '<span class="cd none">已釋放</span>';
    return '<span class="cd none">—</span>';            // confirmed / cancelled
  }

  function actionCell(b) {
    if (b.status === 'pending') {
      return '<div class="act">' +
               '<button type="button" class="btn btn-sm btn-confirm" data-act="confirm" data-id="' + b.id + '">確認到帳</button>' +
               '<button type="button" class="btn btn-sm btn-ghost" data-act="cancel" data-id="' + b.id + '">取消</button>' +
             '</div>';
    }
    if (b.status === 'confirmed') {
      return '<div class="act">' +
               '<button type="button" class="btn btn-sm btn-ghost" data-act="cancel" data-id="' + b.id + '">取消</button>' +
             '</div>';
    }
    if (b.status === 'expired')  return '<div class="act"><span class="done">名額已放回</span></div>';
    return '<div class="act"><span class="done">已取消</span></div>';   // cancelled
  }

  function rowHtml(b) {
    var st = STATUS[b.status] || STATUS.expired;
    var five = b.last5
      ? '<span class="five">' + esc(b.last5) + '</span>'
      : '<span class="five" style="color:var(--mute)">—</span>';

    return '<tr>' +
      '<td><span class="when">' + fmtWhen(b.createdAt) + '</span></td>' +
      '<td>' + sessionsCell(b) + '</td>' +
      '<td><span class="num">' + esc(b.party) + '</span></td>' +
      '<td><b>' + esc(b.name || '—') + '</b><br><span class="phone">' + esc(b.phone) + '</span></td>' +
      '<td>' + five + '</td>' +
      '<td><span class="st ' + st.cls + '"><span class="d"></span>' + st.txt + '</span></td>' +
      '<td>' + countdownCell(b) + '</td>' +
      '<td>' + actionCell(b) + '</td>' +
    '</tr>';
  }

  function renderList() {
    var host = $('#list');
    var rows = C7.bookings().filter(passesFilter);

    if (!rows.length) {
      host.innerHTML = '<div class="empty">這個篩選下沒有訂位</div>';
      return;
    }

    host.innerHTML =
      '<div class="tbl-wrap"><table>' +
        '<thead><tr>' +
          '<th>送出</th><th>場次</th><th>人</th><th>稱呼 · 電話</th>' +
          '<th>後五碼</th><th>狀態</th><th>倒數</th><th>操作</th>' +
        '</tr></thead>' +
        '<tbody>' + rows.map(rowHtml).join('') + '</tbody>' +
      '</table></div>';
  }

  // --- 03 回饋 -------------------------------------------------
  var FB_FIELDS = [
    ['q1_length', '110 分鐘長度'],
    ['q2_again', '願意再參加'], ['q2_why', '　原因'],
    ['q3_price', '票價 2,280 感受'], ['q3_note', '　補充'],
    ['q4_dance', '最愛火舞段'], ['q4_why', '　原因'], ['q4a_light', '第一段光線'],
    ['q5_pace', '出餐節奏'], ['q5_stuck', '　最卡的一波'],
    ['q6_service', '服務'], ['q6_note', '　具體'],
    ['q7_fav', '最愛餐點'],
    ['q8_weak', '最弱餐點'], ['q8_why', '　原因'],
    ['q9_portion', '份量'],
    ['q10_view', '座位視野'], ['q10_seat', '　座位'],
    ['q11_comfort', '草皮舒適度'], ['q11_note', '　具體'],
    ['q12_rec', '會推薦朋友'], ['q12_who', '　推薦給誰／原因'],
    ['consent', '引用同意'], ['ig', 'IG／Threads']
  ];

  function fbVal(v) { return Array.isArray(v) ? v.join('、') : (v == null ? '' : String(v)); }

  function fbCard(f) {
    var rows = FB_FIELDS.map(function (p) {
      var v = fbVal(f[p[0]]);
      if (!v) return '';
      return '<div class="fb-q"><span class="fb-lab">' + esc(p[1]) + '</span><span class="fb-val">' + esc(v) + '</span></div>';
    }).join('');
    var key = fbVal(f.q13_improve);
    var keyHtml = key
      ? '<div class="fb-q fb-key"><span class="fb-lab">★ 最想改</span><span class="fb-val">' + esc(key) + '</span></div>'
      : '';
    var head = '<div class="fb-head">' +
      '<span class="fb-when">' + (f.createdAt ? fmtWhen(f.createdAt) : '') + '</span>' +
      (f.session ? '<span class="fb-ses">' + esc(f.session) + '</span>' : '') +
      '<span class="fb-name">' + esc(f.name || '匿名') + '</span>' +
      (f.firstVisit ? '<span class="fb-first">· 首次 ' + esc(f.firstVisit) + '</span>' : '') +
      '</div>';
    return '<div class="fb-card">' + head + keyHtml + rows + '</div>';
  }

  function renderFeedback() {
    var host = $('#fblist');
    if (!host) return;
    var arr = (C7.feedback ? C7.feedback() : []);
    host.innerHTML = arr.length
      ? arr.map(fbCard).join('')
      : '<div class="empty">目前沒有回饋</div>';
  }

  // --- 04 夥伴折扣碼 -------------------------------------------------
  var PCATS = ['民宿', '旅行社', '其他'];
  function renderPartners() {
    var host = $('#partners'); if (!host || !C7.partners) return;
    var list = C7.partners();
    // 統計各碼使用：完成付款(confirmed)＝佣金結算依據，pending 另計。以「人數」為主（佣金按人頭）。
    var stat = {};
    C7.bookings().forEach(function (b) {
      var c = (b.code || '').toUpperCase(); if (!c) return;
      if (!stat[c]) stat[c] = { cN: 0, cP: 0, pP: 0 };
      var party = Number(b.party) || 0;
      if (b.status === 'confirmed') { stat[c].cN++; stat[c].cP += party; }
      else if (b.status === 'pending') { stat[c].pP += party; }
    });
    if (!list.length) { host.innerHTML = '<div class="empty">還沒有夥伴碼。用上面表單新增。</div>'; return; }
    var html = '';
    PCATS.forEach(function (cat) {
      var rows = list.filter(function (p) { return (p.category || '其他') === cat; })
        .sort(function (a, b) { return String(a.name).localeCompare(String(b.name)); });
      if (!rows.length) return;
      html += '<div class="pcat"><span class="pcat-t">' + esc(cat) + '</span><span class="pcat-n">' + rows.length + ' 家</span></div>';
      rows.forEach(function (p) {
        var s = stat[p.code] || { cN: 0, cP: 0, pP: 0 };
        html += '<div class="prow' + (p.active ? '' : ' off') + '">' +
          '<div class="pmain"><b>' + esc(p.name) + '</b><span class="pcode">' + esc(p.code) + '</span>' + (p.active ? '' : '<span class="poff">停用</span>') + '</div>' +
          '<div class="pstat">已確認 <b>' + s.cP + '</b> 人（' + s.cN + ' 筆）' + (s.pP ? ' · 待匯款 ' + s.pP + ' 人' : '') + '</div>' +
          '<div class="pact">' +
            '<button type="button" class="btn btn-sm btn-ghost" data-pact="toggle" data-code="' + esc(p.code) + '" data-active="' + (p.active ? '1' : '0') + '">' + (p.active ? '停用' : '啟用') + '</button>' +
            '<button type="button" class="btn btn-sm btn-ghost" data-pact="del" data-code="' + esc(p.code) + '">刪除</button>' +
          '</div>' +
        '</div>';
      });
    });
    host.innerHTML = html || '<div class="empty">還沒有夥伴碼。</div>';
  }

  function renderAll() {
    buildSessionLabels();
    renderCaps();
    renderList();
    renderFeedback();
    renderPartners();
  }

  /* --- 操作（事件委派）------------------------------------------- */
  $('#list').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-act]');
    if (!btn) return;
    var id = btn.getAttribute('data-id');

    if (btn.getAttribute('data-act') === 'confirm') {
      btn.disabled = true;
      C7.confirm(id).then(function () {
        toast('已確認 · 名額已算入');
      }).catch(function (err) {
        toast('確認失敗：' + (err && err.message ? err.message : '請重試'));
        btn.disabled = false;
      });
    } else if (btn.getAttribute('data-act') === 'cancel') {
      // 破壞性動作：二次確認
      if (window.confirm('確定取消這筆訂位？名額會放回。')) {
        btn.disabled = true;
        C7.cancel(id).then(function () {
          toast('已取消');
        }).catch(function (err) {
          toast('取消失敗：' + (err && err.message ? err.message : '請重試'));
          btn.disabled = false;
        });
      }
    }
  });

  /* --- 篩選列 ----------------------------------------------------- */
  $('#filters').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-filter]');
    if (!btn) return;
    filter = btn.getAttribute('data-filter');
    Array.prototype.forEach.call(this.querySelectorAll('button'), function (b) {
      var on = b === btn;
      b.classList.toggle('on', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    renderList();
  });

  /* --- 夥伴折扣碼：新增/更新 + 啟停/刪除 ------------------------- */
  $('#partnerForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var name = $('#pName').value.trim();
    var code = $('#pCode').value.trim();
    if (!name || !code) { toast('請填名稱與代碼'); return; }
    C7.savePartner({ name: name, code: code, category: $('#pCat').value, active: true }).then(function () {
      toast('已儲存 ' + name + '（' + code.toUpperCase() + '）');
      $('#pName').value = ''; $('#pCode').value = ''; $('#pName').focus();
    }).catch(function (err) { toast('儲存失敗：' + (err && err.message ? err.message : '請重試')); });
  });

  $('#partners').addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-pact]'); if (!btn) return;
    var code = btn.getAttribute('data-code');
    var act = btn.getAttribute('data-pact');
    if (act === 'del') {
      if (!window.confirm('刪除夥伴碼 ' + code + '？已產生的訂位不受影響。')) return;
      btn.disabled = true;
      C7.deletePartner(code).then(function () { toast('已刪除 ' + code); })
        .catch(function (err) { toast('刪除失敗：' + (err && err.message ? err.message : '請重試')); btn.disabled = false; });
    } else if (act === 'toggle') {
      var nowActive = btn.getAttribute('data-active') === '1';
      var p = C7.partners().filter(function (x) { return x.code === code; })[0] || { code: code };
      btn.disabled = true;
      C7.savePartner({ code: code, name: p.name, category: p.category, active: !nowActive })
        .then(function () { toast(nowActive ? '已停用 ' + code : '已啟用 ' + code); })
        .catch(function (err) { toast('失敗：' + (err && err.message ? err.message : '請重試')); btn.disabled = false; });
    }
  });

  /* --- 倒數每秒刷新（只改 pending 列的文字，不整表重繪）---------- */
  function tick() {
    var now = Date.now();
    Array.prototype.forEach.call(document.querySelectorAll('.cd[data-hold]'), function (el) {
      el.textContent = C7.fmtCountdown(Number(el.getAttribute('data-hold')) - now);
    });
  }

  /* ================================================================
     啟動後台（登入後才呼叫一次）
  ================================================================ */
  var started = false;
  function startAdmin() {
    if (started) { renderAll(); return; }
    started = true;

    C7.releaseExpired();        // 先把逾時 pending 落地、釋放名額，再首次渲染
    renderAll();

    C7.subscribe(renderAll);    // 任何資料變動 → 全表重繪
    setInterval(tick, 1000);    // 倒數每秒更新（歸零的列會在下次 releaseExpired 重繪時轉「已過期」）
    setInterval(function () { C7.releaseExpired(); }, 30000);   // 每 30 秒釋放逾時名額
  }

  /* --- 初始畫面由上方 C7.onAuth 決定（Firebase 會記住登入狀態）--- */

})();
</script>
</body>
</html>
